stages:
  - test
  - build
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# ── Test ──────────────────────────────────────────────────────────────────────
test:scoring-engine:
  stage: test
  image: python:3.12-slim
  script:
    - pip install -q fastapi pydantic groq
    - python3 -c "
from app.scoring import ScoringInputs, score, get_phi_for_sector
phi = get_phi_for_sector('plumbing')
i = ScoringInputs('Test Name','Plumbing',0.9,0.05,phi,0.35,0.55)
o = score(i)
assert o.band == 'Stable Atom', f'Expected Stable Atom, got {o.band}'
assert o.Rsn > 0, 'Expected positive Rsn'
print('All scoring tests passed')
"

# ── Build ─────────────────────────────────────────────────────────────────────
build:docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $DOCKER_IMAGE -t $DOCKER_IMAGE_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  only:
    - main

# ── Deploy to Cloudflare (via Wrangler or your VPS) ──────────────────────────
deploy:cloudflare:
  stage: deploy
  image: node:20-slim
  script:
    # If using Cloudflare Workers + KV for env vars:
    - npm install -g wrangler
    - wrangler deploy --env production
    # OR if deploying container to a VPS behind Cloudflare:
    # - ssh $DEPLOY_USER@$DEPLOY_HOST "docker pull $DOCKER_IMAGE_LATEST && docker-compose up -d"
  environment:
    name: production
    url: https://name.intent-tensor-theory.com
  only:
    - main
  when: manual  # manual trigger = you decide when to push live
